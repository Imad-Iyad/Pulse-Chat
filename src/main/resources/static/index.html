<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PulseChat</title>
    <link rel="stylesheet" href="/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<!-- Login Screen -->
<div id="auth">

    <!-- LOGIN -->
    <div id="loginBox">
        <h2>Login</h2>
        <label for="username"></label><input id="username" placeholder="Username">
        <label for="password"></label><input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="error" class="error"></p>
        <p>
            Don't have account?
            <a href="#" onclick="showRegister()">Create Account</a>
        </p>
    </div>

    <!-- REGISTER -->
    <div id="registerBox" style="display:none">
        <h2>Create Account</h2>
        <label for="registerUsername"></label><input id="registerUsername" placeholder="Username">
        <br><br>
        <label for="registerDisplayName"></label><input id="registerDisplayName" placeholder="Display name">
        <br><br>
        <label for="registerEmail"></label><input id="registerEmail" placeholder="Email">
        <br><br>
        <label for="registerPassword"></label><input id="registerPassword" type="password" placeholder="Password">
        <br><br>
        <button onclick="register()">Create Account</button>
        <p>
            Already have account?
            <a href="#" onclick="showLogin()">Login</a>
        </p>
    </div>

</div>

<!-- Main App -->
<div id="app" style="display:none;">
    <h2>Welcome to PulseChat</h2>
    <button onclick="logout()">Logout</button>

    <hr>

    <h3>Search Users</h3>
    <label for="searchInput"></label><input id="searchInput" placeholder="Search username...">
    <button onclick="searchUsers()">Search</button>

    <ul id="results"></ul>
</div>

<!-- Chat UI -->
<div id="chat">
    <h3 id="chatTitle"></h3>
    <div id="messages" class="messages-box"></div>
    <div class="send-area">
        <label for="messageInput"></label><input id="messageInput" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<!-- WebSocket Libraries -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<!-- App Logic -->
<script src="/js/app.js"></script>

</body>
</html>
